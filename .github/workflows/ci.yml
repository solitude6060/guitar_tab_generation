name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "plan/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: uv test suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Verify repository hygiene
        run: |
          test -z "$(git ls-files .omx)"
          test -z "$(git ls-files | grep -E '(^|/)(__pycache__|\.pytest_cache)(/|$)|\.(pyc|pyo)$|\.egg-info(/|$)' || true)"
          ! git log --format=%B HEAD | grep -i 'Co-authored-by: OmX'

      - name: Run tests
        run: uv run pytest -q

      - name: Verify CLI entrypoint
        run: uv run guitar-tab-generation --help
